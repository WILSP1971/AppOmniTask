name: Flutter CI

on:
  pull_request:
    paths: ["omnitask_app/**"]
  push:
    branches: [main]
    paths: ["omnitask_app/**"]
  workflow_dispatch: {}

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omnitask_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"

      - run: flutter pub get

      # freezed/json_serializable/riverpod_generator no se versionan (§24) —
      # sin este paso, analyze/test fallarían por *.freezed.dart/*.g.dart faltantes.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test
