name: omnitask_app
description: OmniTask — agenda profesional con recordatorios y confirmaciones por WhatsApp.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado y DI (§12)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Red (§12, §19)
  dio: ^5.4.3

  # Modelos inmutables (§9, §12, §14, §15, §16, §17)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navegación + deep link desde push (§12, §15)
  go_router: ^14.2.0

  # Calendario (§1, §12) — 26.x choca con Flutter 3.44+: su propia clase
  # SelectionDetails quedó ambigua contra la que el framework agregó después.
  syncfusion_flutter_calendar: ^34.1.31

  # Push y notificaciones locales en primer plano (§8, §12, §17, §20)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^22.0.1

  # Sesión (§10, §15)
  flutter_secure_storage: ^9.2.2

  # Zona horaria del dispositivo, nunca escrita a mano (§9, §15) — 1.x aplica
  # su propio Kotlin Gradle Plugin con un JVM target que choca con Java 17.
  flutter_timezone: ^5.1.0

  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
